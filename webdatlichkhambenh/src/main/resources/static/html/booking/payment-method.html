<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phương thức thanh toán</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&subset=vietnamese&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../css/booking-common.css" />
    <link rel="stylesheet" href="../../css/payment-method.css" />
  </head>
  <body>
    <header class="booking-header">
      <i class="fas fa-arrow-left" id="btnBack"></i>
      <span>Phương thức thanh toán</span>
      <i class="fas fa-home" id="btnHome"></i>
    </header>

    <div class="page-wrap">
      <div class="booking-stepper">
        <div class="step done"><i class="fas fa-user"></i></div>
        <div class="line active"></div>
        <div class="step done"><i class="fas fa-stethoscope"></i></div>
        <div class="line active"></div>
        <div class="step done"><i class="fas fa-file-alt"></i></div>
        <div class="line active"></div>
        <div class="step current"><i class="fas fa-wallet"></i></div>
        <div class="line"></div>
        <div class="step"><i class="fas fa-clipboard-list"></i></div>
      </div>

      <main class="payment-content">
        <section class="payment-card">
          <div class="section-title-row">
            <div class="section-icon"><i class="fas fa-wallet"></i></div>
            <h2>Phương thức thanh toán</h2>
          </div>

          <div class="payment-options" id="paymentOptions">
            <button class="payment-option" type="button" data-method="cash">
              <div class="option-left">
                <div class="option-icon">
                  <i class="fas fa-money-bill-wave"></i>
                </div>
                <div class="option-label">Thanh toán tiền mặt</div>
              </div>
              <span class="option-radio"></span>
            </button>

            <button
              class="payment-option selected"
              type="button"
              data-method="momo"
            >
              <div class="option-left">
                <div class="option-icon momo">mo<br />mo</div>
                <div class="option-label strong">Ví điện tử MoMo</div>
              </div>
              <span class="option-radio"></span>
            </button>
          </div>
        </section>
      </main>

      <footer class="payment-footer">
        <div class="footer-total">
          <div class="label">Tổng thanh toán</div>
          <div class="value" id="totalPayment">150.000đ</div>
        </div>
        <button id="btnPayNow" class="btn-pay" type="button">
          Thanh toán ngay <i class="fas fa-arrow-right"></i>
        </button>
      </footer>
    </div>

    <script src="../../javascript/payment-method.js"></script>
  </body>
</html>
