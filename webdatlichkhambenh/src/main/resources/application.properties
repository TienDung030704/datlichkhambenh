# ===========================
# DATABASE CONFIGURATION
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/dat_lich_kham_benh_db?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Database connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-test-query=SELECT 1

# Database initialization
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# JPA/Hibernate configuration
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# SERVER CONFIGURATION
# ===========================
server.port=8080
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ===========================
# APPLICATION CONFIGURATION
# ===========================
spring.application.name=WebDatLichKhamBenh

# ===========================
# LOGGING CONFIGURATION
# ===========================
logging.level.com.webdatlichkhambenh=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG


# ===========================
# GEMINI API CONFIGURATION
# ===========================
# AI Configuration (Spring AI)
# Groq AI Configuration (Primary for Chat)
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.3-70b-versatile

# Gemini AI Configuration (Primary for Embeddings, secondary for Chat)
gemini.api.key=${GEMINI_API_KEY}

gemini.chat.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
gemini.embed.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent
